<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body onload="appInit()">
<header id="app-header"></header>
<main>
    <div id="alert-box"></div>
    <section class="hero">
        <h1>Your Cart</h1>
        <p>Review the items you added and remove them if you need to adjust the order.</p>
    </section>

    <section class="section">
        <div id="cart-items"></div>
        <div class="cart-summary">
            <div>
                <h2>Order summary</h2>
                <p>Review items before checkout.</p>
            </div>
            <div id="cart-total">₹ 0</div>
        </div>
        <div class="checkout-card">
            <h2>Checkout</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" name="deliveryAddress" required placeholder="Street, house no.">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="deliveryCity" required placeholder="City">
                </div>
                <div class="form-group">
                    <label>Zip Code</label>
                    <input type="text" name="deliveryZipCode" required placeholder="Zip code">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select name="paymentMethod">
                        <option value="COD">Cash on Delivery</option>
                        <option value="UPI">UPI</option>
                        <option value="CARD">Card</option>
                        <option value="WALLET">Wallet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Discount Code</label>
                    <input type="text" name="discountCode" placeholder="Enter code (optional)">
                </div>
                <div class="form-group">
                    <label>Special Instructions</label>
                    <input type="text" name="specialInstructions" placeholder="Leave at gate, call on arrival...">
                </div>
                <div class="checkout-actions">
                    <button type="submit">Place Order</button>
                    <button type="button" onclick="clearCart()" class="secondary">Clear Cart</button>
                </div>
            </form>
        </div>
    </section>
</main>
<footer>
    Quick Commerce — manage your cart in one place.
</footer>
<script src="/js/app.js"></script>
</body>
</html>
