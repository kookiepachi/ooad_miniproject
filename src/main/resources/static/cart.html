<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body onload="appInit()">
<header id="app-header"></header>
<main>
    <div id="alert-box"></div>
    <section class="hero">
        <h1>Your Shopping Cart</h1>
        <p>Review your items and proceed to secure checkout. Fast and safe payment options available!</p>
    </section>

    <section class="cart-layout">
        <div class="cart-panel">
            <h2 class="section-title">Your Items</h2>
            <div id="cart-items" class="cart-items-list"></div>
            <button type="button" onclick="clearCart()" class="secondary-btn">Clear Cart</button>
        </div>

        <div class="checkout-panel">
            <h2 class="section-title">Order Summary &amp; Checkout</h2>
            <div class="summary-box">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cart-subtotal">Rs 0</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee:</span>
                    <span id="delivery-fee">Rs 40</span>
                </div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span id="cart-total">Rs 0</span>
                </div>
            </div>

            <form id="checkout-form" class="checkout-form">
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" name="deliveryAddress" required placeholder="Street, house no., apartment">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="deliveryCity" required placeholder="City">
                </div>
                <div class="form-group">
                    <label>Zip Code</label>
                    <input type="text" name="deliveryZipCode" required placeholder="Zip code">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select name="paymentMethod">
                        <option value="COD">Cash on Delivery</option>
                        <option value="UPI">UPI</option>
                        <option value="CARD">Card</option>
                        <option value="WALLET">Wallet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Discount Code (Optional)</label>
                    <input type="text" name="discountCode" placeholder="Enter promo code">
                </div>
                <div class="form-group">
                    <label>Special Instructions (Optional)</label>
                    <input type="text" name="specialInstructions" placeholder="Leave at gate, call on arrival, no onions...">
                </div>
                <button type="submit">Place Order</button>
            </form>
        </div>
    </section>
</main>
<footer>
    Quick Commerce - manage your cart in one place.
</footer>
<script src="/js/app.js"></script>
</body>
</html>
